<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>越剧文脉守护者 · 七日革新录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="game-wrapper">
    <!-- 背景层 -->
    <div id="bgLayer" class="bg-layer"></div>
    <!-- 立绘层 -->
    <div id="spriteLayer" class="sprite-layer">
        <img id="charSprite" src="" alt="角色立绘" style="display: none;">
    </div>
    <!-- 顶部数值面板 -->
    <div id="statsPanel" class="stats-panel"></div>
    <!-- 底部对话框区域 (点击推进) -->
    <div id="dialogArea" class="dialog-area">
        <div id="dialogName" class="dialog-name"></div>
        <div id="dialogText" class="dialog-text"></div>
        <!-- 选项容器 (默认隐藏) -->
        <div id="optionsContainer" class="options-container hide"></div>
        <!-- 继续提示 -->
        <div id="nextIndicator" class="next-indicator">▼ 点击继续 ▼</div>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
