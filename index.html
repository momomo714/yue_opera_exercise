<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>越剧文脉守护者 · 永兴戏班七日劫</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="game-wrapper">
    <!-- 背景层 -->
    <div class="bg-layer" id="bgLayer"></div>
    
    <!-- 立绘层 (左下) -->
    <div class="sprite-layer" id="spriteLayer">
        <img id="charSprite" src="" alt="" style="display: none;">
    </div>

    <!-- UI 层 -->
    <div class="game-container">
        <div class="stats-panel" id="statsPanel"></div>
        <div class="story-area" id="storyArea">
            <div class="story-text" id="storyText"></div>
        </div>
        <div class="options-area" id="optionsArea"></div>
        <!-- 继续按钮区域会由 js 动态添加，但也可预置 -->
        <footer>⚡ 文脉不死 · 薪火相传 ⚡</footer>
    </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
